name: DriveMaster CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drive_test
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, mysql, gd
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Configure test DB
        run: |
          echo "DB_CONNECTION=mysql"    >> .env
          echo "DB_HOST=127.0.0.1"     >> .env
          echo "DB_PORT=3306"           >> .env
          echo "DB_DATABASE=drive_test" >> .env
          echo "DB_USERNAME=root"       >> .env
          echo "DB_PASSWORD=root"       >> .env

      - name: Run Laravel Pint (PHP linter)
        run: ./vendor/bin/pint --test

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Build frontend
        run: npm run build

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --parallel

  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_PRIVATE_KEY }}
          port:        22
          timeout:     120s
          script: |
            set -e
            cd /var/www/drivemaster

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Installing PHP deps ──"
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            echo "── Syncing built assets ──"
            # Assets are built in CI and synced here; or rebuild on server:
            npm ci && npm run build

            echo "── Running migrations ──"
            php artisan migrate --force

            echo "── Clearing & caching ──"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "── Restarting queue workers ──"
            php artisan queue:restart

            echo "── Reloading PHP-FPM ──"
            sudo systemctl reload php8.2-fpm

            echo "✅ Deployment complete"
